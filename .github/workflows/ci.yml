name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  baseline-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run backlog lint
        run: |
          python3 scripts/backlog_lint.py
          python3 scripts/backlog_sync.py

      - name: Run baseline unit tests
        run: |
          python3 -m unittest -v tests/test_backlog_lint.py
          python3 -m unittest -v tests/test_backlog_sync.py
          python3 -m unittest -v tests/test_argus_hardening.py
          python3 -m unittest -v tests/test_processed_finalization.py

  shell-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate governance scripts
        run: |
          bash -n scripts/preflight_finalization_check.sh
          bash -n scripts/premerge_check.sh
